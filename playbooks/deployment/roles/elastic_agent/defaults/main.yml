---
# Elastic Agent default variables
elastic_agent_version: "{{ elastic_agent_version | default('8.17.0') }}"

# Fleet Server connection details (override via group_vars or extra-vars)
fleet_url: "{{ fleet_url }}"
fleet_enrollment_token: "{{ fleet_enrollment_token }}"

# Installation paths
elastic_agent_install_dir: /opt/Elastic/Agent
elastic_agent_download_dir: /tmp

# Reinstall control
elastic_agent_force_reinstall: false

# Download URL pattern
elastic_agent_download_url: >-
  https://artifacts.elastic.co/downloads/beats/elastic-agent/elastic-agent-{{ elastic_agent_version }}-linux-x86_64.tar.gz
