---
# Elastic Webhook Rulebook for AAP EDA
# Receives alerts from Elastic Observability via webhook and dispatches
# remediation job templates on the AAP Controller.

- name: Elastic Observability Alert Remediation
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: "{{ eda_webhook_port | default(5000) }}"

  rules:
    # ---------------------------------------------------------------
    # Rule 1 - High CPU
    # ---------------------------------------------------------------
    - name: Remediate High CPU Alert
      condition: >-
        event.payload.rule is defined
        and event.payload.rule.name is match(".*high.cpu.*", ignorecase=true)
        or (event.payload.alert_type is defined and event.payload.alert_type == "high_cpu")
      action:
        run_job_template:
          name: "FDA - Remediate High CPU"
          organization: "Default"
          job_args:
            extra_vars:
              target_hosts: "{{ event.payload.host | default('all') }}"
              correlation_id: "{{ event.payload.alert_id | default('eda-triggered') }}"

    # ---------------------------------------------------------------
    # Rule 2 - Disk Full / Disk Space
    # ---------------------------------------------------------------
    - name: Remediate Disk Full Alert
      condition: >-
        event.payload.rule is defined
        and (event.payload.rule.name is match(".*disk.full.*", ignorecase=true)
        or event.payload.rule.name is match(".*disk.space.*", ignorecase=true))
        or (event.payload.alert_type is defined and event.payload.alert_type == "disk_full")
      action:
        run_job_template:
          name: "FDA - Remediate Disk Full"
          organization: "Default"
          job_args:
            extra_vars:
              target_hosts: "{{ event.payload.host | default('all') }}"
              correlation_id: "{{ event.payload.alert_id | default('eda-triggered') }}"

    # ---------------------------------------------------------------
    # Rule 3 - Service Down
    # ---------------------------------------------------------------
    - name: Remediate Service Down Alert
      condition: >-
        event.payload.rule is defined
        and event.payload.rule.name is match(".*service.down.*", ignorecase=true)
        or (event.payload.alert_type is defined and event.payload.alert_type == "service_down")
      action:
        run_job_template:
          name: "FDA - Remediate Service Down"
          organization: "Default"
          job_args:
            extra_vars:
              target_hosts: "{{ event.payload.host | default('all') }}"
              service_name: "{{ event.payload.service_name | default('nginx') }}"
              correlation_id: "{{ event.payload.alert_id | default('eda-triggered') }}"

    # ---------------------------------------------------------------
    # Rule 4 - Catch-All / Unhandled Alerts
    # ---------------------------------------------------------------
    - name: Log Unhandled Alert
      condition: >-
        event.payload is defined
        and (event.payload.rule is not defined
             or (event.payload.rule.name is not match(".*high.cpu.*", ignorecase=true)
                 and event.payload.rule.name is not match(".*disk.full.*", ignorecase=true)
                 and event.payload.rule.name is not match(".*disk.space.*", ignorecase=true)
                 and event.payload.rule.name is not match(".*service.down.*", ignorecase=true)))
      action:
        debug:
          msg: "Unhandled alert received: {{ event.payload }}"
